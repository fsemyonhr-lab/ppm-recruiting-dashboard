name: Обновление дашборда

on:
  schedule:
    - cron: "7 * * * *"   # каждый час в 7 минут (гитхаб может запускать с задержкой)
  workflow_dispatch:       # кнопка ручного запуска во вкладке Actions

permissions:
  contents: write

concurrency:
  group: dashboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установка зависимостей
        run: pip install requests

      - name: Сбор данных из Huntflow
        env:
          HUNTFLOW_TOKEN: ${{ secrets.HUNTFLOW_TOKEN }}
        run: python fetch_huntflow.py

      - name: Публикация data.json
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json cache.json
          if git diff --cached --quiet; then
            echo "Изменений нет, коммит не нужен"
          else
            git commit -m "data: автообновление"
            git push
          fi
